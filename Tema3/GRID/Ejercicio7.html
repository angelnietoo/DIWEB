<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Ejercicio 7</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
<style>

* { margin: 0; 
  padding: 0; 
  box-sizing: border-box;
}

body {
  font-family: "Montserrat", sans-serif;
}

header {
  background: #263640;
  color: #fff;
}

.inner {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  padding: 18px 20px;
}

.nav ul {
  display: grid;
  grid-auto-flow: column;
  list-style: none;
  justify-content: center;
  gap: 20px;
}

a {
  color: #9fb0bd;
  text-decoration: none;
}

.auth a {
  padding: 6px 12px;
  border-radius: 6px;
  font-weight: 600;
  margin-left: 8px;
}

.auth a:first-child {
  background: #3fa9ff;
  color: #fff;
}

.auth a:last-child {
  border: 1px solid #9fb0bd;
}

</style>
</head>

<body>
<header>
  <div class="inner">
    
    <div><strong>MiWeb</strong></div>

    <nav class="nav">
      <ul>
        <li><a href="#">Inicio</a></li>
        <li><a href="#">Artículos</a></li>
        <li><a href="#">Contacto</a></li>
      </ul>
    </nav>

    <div class="auth">
      <a href="#">Entrar</a>
      <a href="#">Registro</a>
    </div>

  </div>
</header>
</body>
</html>
