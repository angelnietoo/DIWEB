<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ejercicio 4 - Grupo de tarjetas</title>
<style>
  
  body{
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    margin:20px;
    background:#f7f8f9;
  }

  .card-set{
    display:grid;
    grid-auto-flow:column;
    gap:12px;
    padding:12px;
  }

  .card{
    display:grid;
    grid-template-rows: 40px 1fr 30px;
    min-height: 250px;
    background:#fff;
    box-shadow:0 6px 16px rgba(0,0,0,0.06);
  }

  .card header, .card footer{
    display:grid;
    place-items:center;
    color:#010000;
    background:#91CDF2;
  }

  .card .body{
    padding:14px;
    color:#222;
    line-height:1.4;
    background:#fff;
  }

  h2, h4 { 
    margin:0; 
    font-weight:700; 
  }

</style>
</head>
<body>

  <div class="card-set" aria-label="Conjunto de tarjetas">
    <article class="card" role="article" aria-label="Tarjeta A">
      <header><h2>Título</h2></header>
      <div class="body">Contenido de la tarjeta 1</div>
      <footer><h4>Pie</h4></footer>
    </article>

    <article class="card" role="article" aria-label="Tarjeta B">
      <header><h2>Título</h2></header>
      <div class="body">Contenido de la tarjeta 2</div>
      <footer><h4>Pie</h4></footer>
    </article>

    <article class="card" role="article" aria-label="Tarjeta C">
      <header><h2>Título</h2></header>
      <div class="body">Contenido de la tarjeta 3</div>
      <footer><h4>Pie</h4></footer>
    </article>
  </div>
</body>
</html>
