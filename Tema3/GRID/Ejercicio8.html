<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ejercicio 8</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box
}

body{
  font-family:Montserrat,sans-serif;
  background:#f2f3f4;
  display:grid;
  grid-template-rows:auto 1fr;
}

header{background:#263640;color:#fff}

.inner{
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  padding:18px 20px;
}

.nav ul{
  display:grid;
  grid-auto-flow:column;
  list-style:none;
  justify-content:center;
  gap:20px;
}

a{color:#9fb0bd;text-decoration:none}

.auth a{
  padding:6px 12px;
  border-radius:6px;
  font-weight:600;
  margin-left:8px;
}

.auth a:first-child{background:#3fa9ff;color:#fff}
.auth a:last-child{border:1px solid #9fb0bd}

.page{
  display:grid;
  grid-template-columns:220px 1fr;
  gap:20px;
  padding:20px;
}

aside, .card{
  background:#fff;
  padding:16px;
  border-radius:6px;
  box-shadow:0 4px 10px rgba(0,0,0,.05);
}

.content{display:grid;gap:16px}

.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
}

.tarjeta-a{grid-column:1/-1}
.tarjeta-b{grid-column:3/5}
.tarjeta-c{grid-column:1}
.tarjeta-d{grid-column:2/5}
.tarjeta-e{grid-column:1/3}
</style>
</head>
<body>
<header>
  <div class="inner">
    <div><strong>MiWeb</strong></div>

    <nav class="nav">
      <ul>
        <li><a href="#">Inicio</a></li>
        <li><a href="#">Artículos</a></li>
        <li><a href="#">Contacto</a></li>
      </ul>
    </nav>

    <div class="auth">
      <a href="#">Entrar</a>
      <a href="#">Registro</a>
    </div>
  </div>
</header>

<div class="page">
  <aside>
    <h3>Enlaces útiles</h3>
    <p>Contenido del aside</p>
  </aside>

  <main class="content">
    <h2>Últimos artículos</h2>

    <section class="cards">
      <div class="card tarjeta-a">Tarjeta A (100%)</div>
      <div class="card tarjeta-e">Tarjeta E (50%)</div>
      <div class="card tarjeta-b">Tarjeta B (50%)</div>
      <div class="card tarjeta-c">Tarjeta C (25%)</div>
      <div class="card tarjeta-d">Tarjeta D (75%)</div>
    </section>
  </main>
</div>

</body>
</html>
