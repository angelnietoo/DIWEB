<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ejercicio 1 - Menú horizontal</title>
<style>

body {
  margin: 0;
  font-family: sans-serif;
}

nav {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  width: 100%;
  background: rgba(123,198,199,0.8);
}

nav a {
  display: block;
  padding: 15px;
  text-align: center;
  text-decoration: none;
  color: rgb(0, 0, 0);
}

</style>
</head>
<body>
<nav aria-label="Menú principal">
  <a href="#">Inicio</a>
  <a href="#">Servicios</a>
  <a href="#">Acerca</a>
  <a href="#">Blog</a>
  <a href="#">Contacto</a>
</nav>
</body>
</html>
