<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ejercicio 5 - Grupo de tarjetas</title>
<style>
  :root{
    --bg: #0e7c74;
    --card-bg: #ffffff;
    --border: lightgray;
  }
  
  html, body { height: 100%; margin: 0; }

  body {
    background: var(--bg);
    display: grid;
    place-items: center;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
    color: #111;
  }

  .card-grid {
    width: 100%;
    max-width: 900px;
    display: grid;
    gap: 16px;
    height: 220px;
  }

  .left {
    grid-row: 1 / span 2;
    background: var(--card-bg);
    padding: 18px;
    display: grid;
  }

  .card {
    background: var(--card-bg);
    display: grid;
    place-items: center;
  }

  .fila1 { grid-column: 2; grid-row: 1; }
  .fila2 { grid-column: 2; grid-row: 2; }

</style>
</head>
<body>
  <main class="card-grid" role="main" aria-label="Grupo de tarjetas">
    <section class="left" aria-label="Columna izquierda">
      <h2>Columna Izquierda</h2>
    </section>
    <div class="card fila1">Fila 1</div>
    <div class="card fila2">Fila 2</div>
  </main>
</body>
</html>
