<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ejercicio 5 - Grupo de tarjetas</title>
<style>

  * { box-sizing: border-box; }

  body {
    padding: 16px 18px;
    background: #0e7c74;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    color: #111;
  }

  main {
    width: 100%;
    max-width: 920px;
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 14px;
  }

  .left, .card {
    background: #fff;
    border: 1px solid lightgray;
    padding: 14px 16px;
  }

  .right {
    display: grid;
    grid-template-rows: 1fr 1fr;
    gap: 14px;
  }


</style>
</head>
<body>
  <main>
    <section class="left">Columna Izquierda</section>
    <div class="right">
      <div class="card">Fila 1</div>
      <div class="card">Fila 2</div>
    </div>
  </main>
</body>
</html>
