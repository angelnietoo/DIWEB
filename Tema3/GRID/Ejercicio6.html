<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Ejercicio 6 - Celdas interiores combinadas</title>
<style>

  body {
    margin: 0;
    padding: 28px;
    background: #f2f3f4;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
  }

  .card {
    background: #fff;
    padding: 16px;
    border-radius: 6px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.06);
  }

  .tarjeta-a { grid-row: 3; grid-column: 1 / -1; }
  .tarjeta-b { grid-row: 1; grid-column: 3 / span 2; }
  .tarjeta-c { grid-row: 2; grid-column: 1; }
  .tarjeta-d { grid-row: 2; grid-column: 2 / span 3; }
  .tarjeta-e { grid-row: 1; grid-column: 1 / span 2; }

</style>
</head>
<body>
  <div class="cards">
    <div class="card tarjeta-a">Tarjeta A (100%)</div>
    <div class="card tarjeta-b">Tarjeta B (50%)</div>
    <div class="card tarjeta-c">Tarjeta C (25%)</div>
    <div class="card tarjeta-d">Tarjeta D (75%)</div>
    <div class="card tarjeta-e">Tarjeta E (50%)</div>
  </div>
</body>
</html>
