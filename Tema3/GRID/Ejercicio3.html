<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ejercicio 3 - Tarjeta</title>
  <style>
    
    body {
      margin: 24px;
      font-family: sans-serif;
      background: #f4f6f7;
    }

    .card {
      width: 320px;
      display: grid;
      grid-template-rows: 80px 1fr 48px;
      background: #fff;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
    }

    .card header, .card footer {
      display: grid;
      place-items: center;
      background: #91CDF2;
      color: #010000;
    }

    .card .body {
      padding: 74px;
      color: #222;
    }

    h2, h4, p {
      margin: 0;
    }

  </style>
</head>
<body>

  <article class="card">
    <header>
      <h2>Título</h2>
    </header>

    <div class="body">
      <p>Contenido...</p>
    </div>

    <footer>
      <h4>Pie</h4>
    </footer>
  </article>

</body>
</html>
