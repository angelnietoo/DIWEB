<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ejercicio 2 - Menú vertical</title>
  <style>

    body {
      margin: 0;
      font-family: sans-serif;
      background: #ffffff;
      color: #222;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 3fr;
      min-height: 100vh;
    }

    aside {
      background: #e6e6e6;
      padding: 24px;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    li {
      padding: 12px 0;
      border-bottom: 1px solid gray;
    }

    main {
      background: #ffffff;
      padding: 24px;
    }
    
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <ul>
        <li>Menú 1</li>
        <li>Menú 2</li>
        <li>Menú 3</li>
        <li>Menú 4</li>
        <li>Menú 5</li>
      </ul>
    </aside>

    <main>
      <p>Contenido</p>
    </main>
  </div>
</body>
</html>
